# Bayesian sweep over all key hyperparameters
program: airbench94_muon.py
method: bayes
metric:
  name: final_val_acc
  goal: maximize
parameters:
  inexact_solver:
    values:
      - cubic_ns_theoretical
      - quintic_ns_theoretical
      - quintic_ns_empirical
      - polar_express
  rank:
    values: [4, 8, 16, 32]
  orth_steps:
    values: [1, 3, 5, 7, 9]
  batch_size:
    values: [500, 1000, 2000, 3000, 4000]
  muon_lr:
    distribution: log_uniform_values
    min: 0.01
    max: 1.0
  muon_momentum:
    distribution: uniform
    min: 0.3
    max: 0.95
command:
  - ${env}
  - python
  - ${program}
  # --- General ---
  - --optimizer-mode
  - muon
  - --epochs
  - "8"
  - --num-trials
  - "1"
  - --val-every-steps
  - "10"
  - --wandb
  - "True"
  # --- SGD (for non-filter params) ---
  - --sgd-momentum
  - "0.85"
  - --sgd-nesterov
  - "True"
  # --- Muon ---
  - --muon-nesterov
  - "True"
  # --- SGD filter (unused in muon mode) ---
  - --filter-sgd-lr
  - "0.24"
  - --filter-sgd-weight-decay
  - "0.0"
  # --- AdamW (unused in muon mode) ---
  - --adamw-beta1
  - "0.9"
  - --adamw-beta2
  - "0.999"
  - --adamw-eps
  - "1e-8"
  - --filter-adamw-lr
  - "0.24"
  - --filter-adamw-weight-decay
  - "0.0"
  # --- Randomized solver ----
  - --randomized
  - "True"
  - --oversampling
  - "10"
  - --power-iters
  - "1"
  # --- Swept by ${args}: inexact_solver, rank, orth_steps, batch_size, muon_lr, muon_momentum ---
  - ${args}
