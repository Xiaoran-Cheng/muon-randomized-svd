# SGD + Nesterov baseline sweep
program: airbench94_muon.py
entity: xjc5161-penn-state
project: sgd-nesterov
method: bayes
metric:
  name: final_val_acc
  goal: maximize
parameters:
  filter_sgd_lr:
    distribution: log_uniform_values
    min: 0.01
    max: 1.0
  sgd_momentum:
    distribution: uniform
    min: 0.3
    max: 0.95
command:
  - ${env}
  - python
  - ${program}
  # --- General ---
  - --optimizer-mode
  - sgd
  - --epochs
  - "8"
  - --num-trials
  - "1"
  - --val-every-steps
  - "10"
  - --wandb
  - "True"
  - --wandb-project
  - sgd-nesterov
  - --batch-size
  - "500"
  # --- SGD (swept + fixed) ---
  - --sgd-nesterov
  - "True"
  - --filter-sgd-weight-decay
  - "0.0"
  # --- Muon (unused in sgd mode) ---
  - --muon-lr
  - "0.24"
  - --muon-momentum
  - "0.6"
  - --muon-nesterov
  - "True"
  # --- AdamW (unused in sgd mode) ---
  - --adamw-beta1
  - "0.9"
  - --adamw-beta2
  - "0.999"
  - --adamw-eps
  - "1e-8"
  - --filter-adamw-lr
  - "0.24"
  - --filter-adamw-weight-decay
  - "0.0"
  # --- Randomized solver (unused in sgd mode) ---
  - --randomized
  - "False"
  - --rank
  - "32"
  - --oversampling
  - "10"
  - --power-iters
  - "0"
  - --orth-steps
  - "5"
  - --inexact_solver
  - "cubic_ns_theoretical"
  # --- Swept by ${args}: filter_sgd_lr, sgd_momentum, batch_size ---
  - ${args}
