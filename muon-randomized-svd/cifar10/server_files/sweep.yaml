# Bayesian sweep over all key hyperparameters (Muon Nesterov, randomized NS) — main method
program: airbench94_muon.py
entity: xjc5161-penn-state
project: muon-nesterov-rand
method: bayes
metric:
  name: final_val_acc
  goal: maximize
parameters:
  inexact_solver:
    values:
      - cubic_ns_theoretical
      - quintic_ns_theoretical
      - quintic_ns_empirical
      - polar_express
  rank:
    values: [16, 32, 64, 128, 256]
  orth_steps:
    values: [1, 3, 5, 7, 9]
  batch_size:
    values: [500, 1000, 2000, 3000, 4000]
  muon_lr:          # 下一次固定
    distribution: log_uniform_values
    min: 0.01
    max: 1.0
  muon_momentum:   # 下一次固定
    distribution: uniform
    min: 0.3
    max: 0.95
  power_iters:
    values: [0, 1, 2, 3, 4, 5]
command:
  - ${env}
  - python
  - ${program}
  # --- General ---
  - --optimizer-mode
  - muon
  - --epochs
  - "8"
  - --num-trials
  - "1"
  - --val-every-steps
  - "10"
  - --wandb
  - "True"
  - --wandb-project
  - muon-nesterov-rand
  # --- SGD (for non-filter params) ---
  - --sgd-momentum
  - "0.85"
  - --sgd-nesterov
  - "True"
  # --- Muon ---
  - --muon-nesterov
  - "True"
  # --- SGD filter (unused in muon mode) ---
  - --filter-sgd-lr
  - "0.24"
  - --filter-sgd-weight-decay
  - "0.0"
  # --- AdamW (unused in muon mode) ---
  - --adamw-beta1
  - "0.9"
  - --adamw-beta2
  - "0.999"
  - --adamw-eps
  - "1e-8"
  - --filter-adamw-lr
  - "0.24"
  - --filter-adamw-weight-decay
  - "0.0"
  # --- Randomized solver ---
  - --randomized
  - "True"
  - --oversampling
  - "10"
  # --- Swept by ${args}: inexact_solver, rank, orth_steps, batch_size, muon_lr, muon_momentum, power_iters ---
  - ${args}
