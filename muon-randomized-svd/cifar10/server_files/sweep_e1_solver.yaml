# E1: Inexact Solver Ablation (anchored at cifar10.sh final-best config)
program: airbench94_muon.py
entity: xjc5161-penn-state
project: e1-solver
method: grid
metric:
  name: final_val_acc
  goal: maximize
parameters:
  inexact_solver:
    values:
      - cubic_ns_theoretical
      - quintic_ns_theoretical
      - quintic_ns_empirical
      - polar_express
command:
  - ${env}
  - python
  - ${program}
  # --- General ---
  - --optimizer-mode
  - muon
  - --epochs
  - "8"
  - --num-trials
  - "50"
  - --val-every-steps
  - "10"
  - --wandb
  - "True"
  - --wandb-project
  - e1-solver
  - --batch-size
  - "1000"
  # --- SGD (for non-filter params) ---
  - --sgd-momentum
  - "0.85"
  - --sgd-nesterov
  - "True"
  # --- Muon (anchor: cifar10.sh best) ---
  - --muon-lr
  - "0.19572308843587835"
  - --muon-momentum
  - "0.48356183431214944"
  - --muon-nesterov
  - "True"
  # --- SGD filter (unused in muon mode) ---
  - --filter-sgd-lr
  - "0.24"
  - --filter-sgd-weight-decay
  - "0.0"
  # --- AdamW (unused in muon mode) ---
  - --adamw-beta1
  - "0.9"
  - --adamw-beta2
  - "0.999"
  - --adamw-eps
  - "1e-8"
  - --filter-adamw-lr
  - "0.24"
  - --filter-adamw-weight-decay
  - "0.0"
  # --- Randomized solver (anchor: cifar10.sh best) ---
  - --randomized
  - "True"
  - --rank
  - "256"
  - --oversampling
  - "10"
  - --power-iters
  - "2"
  - --orth-steps
  - "9"
  # --- Swept by ${args}: inexact_solver ---
  - ${args}
