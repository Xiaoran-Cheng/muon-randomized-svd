# AdamW baseline sweep
program: airbench94_muon.py
entity: xjc5161-penn-state
project: adamw
method: bayes
metric:
  name: final_val_acc
  goal: maximize
parameters:
  filter_adamw_lr:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.01
  adamw_beta1:
    distribution: uniform
    min: 0.85
    max: 0.95
  adamw_beta2:
    distribution: uniform
    min: 0.99
    max: 0.9999
command:
  - ${env}
  - python
  - ${program}
  # --- General ---
  - --optimizer-mode
  - adamw
  - --epochs
  - "8"
  - --num-trials
  - "1"
  - --val-every-steps
  - "10"
  - --wandb
  - "True"
  - --wandb-project
  - adamw
  - --batch-size
  - "500"
  # --- AdamW (swept + fixed) ---
  - --adamw-eps
  - "1e-8"
  - --filter-adamw-weight-decay
  - "0.0"
  # --- SGD (unused in adamw mode) ---
  - --sgd-momentum
  - "0.85"
  - --sgd-nesterov
  - "True"
  - --filter-sgd-lr
  - "0.24"
  - --filter-sgd-weight-decay
  - "0.0"
  # --- Muon (unused in adamw mode) ---
  - --muon-lr
  - "0.24"
  - --muon-momentum
  - "0.6"
  - --muon-nesterov
  - "True"
  # --- Randomized solver (unused in adamw mode) ---
  - --randomized
  - "False"
  - --rank
  - "32"
  - --oversampling
  - "10"
  - --power-iters
  - "0"
  - --orth-steps
  - "5"
  - --inexact_solver
  - "cubic_ns_theoretical"
  # --- Swept by ${args}: filter_adamw_lr, adamw_beta1, adamw_beta2, batch_size ---
  - ${args}
