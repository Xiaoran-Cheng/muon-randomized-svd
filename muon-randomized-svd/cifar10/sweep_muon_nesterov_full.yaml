# Muon (Nesterov momentum, full Newton-Schulz) sweep
program: airbench94_muon.py
entity: xjc5161-penn-state
project: muon-nesterov-full
method: bayes
metric:
  name: final_val_acc
  goal: maximize
parameters:
  muon_lr:
    distribution: log_uniform_values
    min: 0.01
    max: 1.0
  muon_momentum:
    distribution: uniform
    min: 0.3
    max: 0.95
  inexact_solver:
    values:
      - cubic_ns_theoretical
      - quintic_ns_theoretical
      - quintic_ns_empirical
      - polar_express
  orth_steps:
    values: [1, 3, 5, 7, 9]
command:
  - ${env}
  - python
  - ${program}
  # --- General ---
  - --optimizer-mode
  - muon
  - --epochs
  - "8"
  - --num-trials
  - "1"
  - --val-every-steps
  - "10"
  - --wandb
  - "True"
  - --wandb-project
  - muon-nesterov-full
  - --batch-size
  - "1000"
  # --- SGD (for non-filter params) ---
  - --sgd-momentum
  - "0.85"
  - --sgd-nesterov
  - "True"
  # --- Muon (Nesterov: muon-nesterov=True) ---
  - --muon-nesterov
  - "True"
  # --- SGD filter (unused in muon mode) ---
  - --filter-sgd-lr
  - "0.24"
  - --filter-sgd-weight-decay
  - "0.0"
  # --- AdamW (unused in muon mode) ---
  - --adamw-beta1
  - "0.9"
  - --adamw-beta2
  - "0.999"
  - --adamw-eps
  - "1e-8"
  - --filter-adamw-lr
  - "0.24"
  - --filter-adamw-weight-decay
  - "0.0"
  # --- Solver: full NS (randomized=False) ---
  - --randomized
  - "False"
  - --rank
  - "32"
  - --oversampling
  - "10"
  - --power-iters
  - "0"
  # --- Swept by ${args}: muon_lr, muon_momentum, inexact_solver, orth_steps, batch_size ---
  - ${args}
