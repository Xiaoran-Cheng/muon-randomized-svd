# SGD + Nesterov baseline sweep (E5 row 2: every parameter routed through SGD).
program: train_gpt.py
entity: xjc5161-penn-state
project: sgd-nesterov-nanogpt
method: bayes
metric:
  name: final_val_loss
  goal: minimize
parameters:
  sgd_lr:
    distribution: log_uniform_values
    min: 0.0003
    max: 0.03
  sgd_momentum:
    distribution: uniform
    min: 0.3
    max: 0.98
  seq_len:
    values: [1024, 2048, 4096]
command:
  - ${env}
  - torchrun
  - --standalone
  - --nproc_per_node=8
  - ${program}
  # --- General ---
  - --optimizer-mode
  - sgd_nesterov
  - --num-trials
  - "1"
  - --log-every
  - "50"
  - --wandb
  - "True"
  - --wandb-project
  - sgd-nesterov-nanogpt
  # --- SGD (swept + fixed) ---
  - --sgd-nesterov
  - "True"
  # --- Muon (unused in sgd_nesterov mode) ---
  - --muon-lr
  - "0.023"
  - --muon-momentum
  - "0.95"
  - --muon-nesterov
  - "True"
  # --- AdamW (unused) ---
  - --adamw-lr
  - "0.001"
  # --- Randomized solver (unused) ---
  - --randomized
  - "False"
  - --rank
  - "100"
  - --oversampling
  - "10"
  - --power-iters
  - "0"
  - --orth-steps
  - "5"
  - --inexact-solver
  - "polar_express"
  # --- Swept via ${args}: sgd_lr, sgd_momentum, seq_len ---
  - ${args}
